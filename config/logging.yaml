version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s [%(filename)s:%(lineno)d]: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/aurora_x.log
    maxBytes: 10485760
    backupCount: 5

loggers:
  aurora_x:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  aurora_x.ingestion:
    level: INFO
  aurora_x.rl:
    level: DEBUG
  aurora_x.safety:
    level: WARNING

root:
  level: INFO
  handlers: [console]
