# ──────────────────────────────────────────────────────────────
# AURORA-X CI · Rust Core (aurora_core/)
# Lint → Format → Build → Test
# ──────────────────────────────────────────────────────────────
name: "CI · Rust Core"

on:
  push:
    branches: [main, develop]
    paths:
      - "aurora_core/**"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "aurora_core/**"
      - ".github/workflows/ci-rust.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aurora_core

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aurora_core/target
          key: rust-${{ runner.os }}-${{ hashFiles('aurora_core/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      # ── Python headers needed for PyO3 ──
      - name: Install Python 3.11 (PyO3 dependency)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test --all-targets --verbose
