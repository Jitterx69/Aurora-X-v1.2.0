# AURORA-X CI - Python (aurora_x/, scripts/, tests/)
# Lint -> Format -> Type-check -> Test -> Import Verify
name: "CI - Python"

on:
    push:
        branches: [main, develop]
        paths:
            - "aurora_x/**"
            - "scripts/**"
            - "tests/**"
            - "requirements.txt"
            - ".github/workflows/ci-python.yml"
    pull_request:
        branches: [main, develop]
        paths:
            - "aurora_x/**"
            - "scripts/**"
            - "tests/**"
            - "requirements.txt"
            - ".github/workflows/ci-python.yml"

concurrency:
    group: python-ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    python-ci:
        name: Python CI
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Setup Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install torch --index-url https://download.pytorch.org/whl/cpu
                  pip install -r requirements.txt
                  pip install ruff mypy bandit

            - name: Lint with Ruff
              run: ruff check aurora_x/ scripts/ tests/ || true

            - name: Check formatting with Ruff
              run: ruff format --check aurora_x/ scripts/ tests/ || true

            - name: Type check with mypy
              run: |
                  mypy aurora_x/ \
                    --ignore-missing-imports \
                    --no-strict-optional \
                    --allow-untyped-defs \
                    --no-error-summary 2>&1 | head -100 || true

            - name: Security lint with Bandit
              run: |
                  bandit -r aurora_x/ scripts/ \
                    -ll \
                    --severity-level high \
                    -f screen || true

            - name: Verify package imports
              run: |
                  python -c "
                  import aurora_x
                  from aurora_x.security.access_control import SecurityManager, AccessTier
                  from aurora_x.security.review_manager import ReviewManager
                  print('All critical imports verified')
                  "

            - name: Run pytest
              run: |
                  pytest tests/ \
                    -v \
                    --tb=short \
                    --strict-markers \
                    --color=yes \
                    || echo "No tests found in tests/ directory"

            - name: Check for hardcoded secrets
              run: |
                  FOUND=$(grep -rn 'AKIA[0-9A-Z]\{16\}' aurora_x/ scripts/ config/ 2>/dev/null || true)
                  if [ -n "$FOUND" ]; then
                    echo "Potential hardcoded secrets detected!"
                    echo "$FOUND"
                    exit 1
                  fi
                  echo "No hardcoded secrets found"
