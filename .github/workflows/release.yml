# AURORA-X - Release Automation
# Tag-triggered -> Build all stacks -> GitHub Release
name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag '$TAG' does not match semver format"
            exit 1
          fi
          echo "Valid semver tag: $TAG"

  build-rust:
    name: Build Rust Wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate-tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        working-directory: aurora_core
        run: maturin build --release --out ../dist/

      - name: Upload Rust wheel
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel
          path: dist/*.whl

      - name: Attest Build Provenance (Rust)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.whl

  build-go:
    name: Build Go Binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate-tag]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: services
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="aurora-services-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../dist/${BINARY_NAME}" ./cmd/aurora-services

      - name: Upload Go binary
        uses: actions/upload-artifact@v4
        with:
          name: go-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/aurora-services-*

      - name: Attest Build Provenance (Go)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/aurora-services-*

  docker-release:
    name: Docker Release Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [validate-tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push release image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest Build Provenance (Docker)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-rust, build-go, docker-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "## What Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "$CHANGES" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Docker Image" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
